<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Open profiles</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0b1220;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

.container{
max-width:400px;
padding:20px;
}

h1{
font-size:28px;
margin-bottom:10px;
}

p{
color:#cbd5e1;
}

.btn{
display:inline-block;
margin-top:25px;
padding:16px 28px;
border-radius:12px;
background:linear-gradient(45deg,#ff4d7a,#ff6a95);
color:white;
text-decoration:none;
font-weight:bold;
font-size:18px;
box-shadow:0 0 25px rgba(255,80,120,0.6);
}

.arrow{
position:fixed;
top:65px;
right:20px;
font-size:60px;
color:#ff4d7a;
animation:arrowMove 1.5s infinite;
}

@keyframes arrowMove{

0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}

}

.arrow-text{
position:fixed;
top:120px;
right:15px;
font-size:14px;
color:#fff;
opacity:0.9;
}

</style>

<script>

const url = "https://go.cm-trk6.com/aff_f?h=rA47F6&aff_sub5=free-social";

const ua = navigator.userAgent.toLowerCase();

if(ua.includes("android")){
    
window.location.replace(url);

}

</script>

</head>

<body>

<div class="arrow">⬆</div>
<div class="arrow-text">Tap here</div>

<div class="container">

<h1>New profiles found 🔥</h1>

<p>Click below to see the profiles.</p>

<a class="btn" href="https://go.cm-trk6.com/aff_f?h=rA47F6&aff_sub5=free-social">
View profiles
</a>

<p style="margin-top:20px;font-size:14px;">
If profiles do not open,<br>
tap ••• in the top right<br>
and choose <b>"Open in browser"</b>
</p>

</div>

</body>
</html>
